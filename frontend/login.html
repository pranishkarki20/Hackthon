<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In - MedCare</title>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="header-content">
            <a href="index.html" class="logo">
                <div class="logo-icon"><i class="ph-fill ph-cross"></i></div>
                MedCare
            </a>
            <nav style="flex: 1; display: flex; justify-content: flex-end;">
                <p style="margin: 0; color: var(--text-main); font-weight: 500;">
                    New to MedCare? <a href="signup.html" style="font-weight: 700; margin-left: 0.5rem;">Create Account</a>
                </p>
            </nav>
        </div>
    </header>

    <main class="auth-container">
        <div class="form-card">
            <div class="form-header">
                <div class="logo-icon" style="margin: 0 auto 1.5rem;">
                    <i class="ph-fill ph-user-circle"></i>
                </div>
                <h2 style="font-size: 2rem; margin-bottom: 0.5rem;">Welcome Back</h2>
                <p>Sign in to your patient dashboard</p>
            </div>

            <form id="loginForm" action="dashboard.html" method="GET">
                <div class="form-group">
                    <label for="email" class="form-label">Email Address</label>
                    <input type="email" id="email" class="form-input" placeholder="john.doe@example.com" required>
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" id="password" class="form-input" placeholder="••••••••" required>
                </div>

                <div class="form-options">
                    <label class="form-checkbox">
                        <input type="checkbox" id="remember">
                        <span>Remember my device</span>
                    </label>
                    <a href="#">Forgot password?</a>
                </div>

                <button type="submit" class="btn btn-primary form-submit">
                    Sign In Securely <i class="ph-bold ph-arrow-right"></i>
                </button>
            </form>
            
            <div class="form-footer">
                <p>Secured by MedCare Enterprise Grade Encryption <i class="ph-fill ph-shield-check" style="color: var(--secondary); vertical-align: middle;"></i></p>
            </div>
        </div>
    </main>

    <script src="js/script.js"></script>
</body>
</html>
